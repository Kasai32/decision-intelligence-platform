name: decision-intelligence-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dip
      POSTGRES_PASSWORD: dip
      POSTGRES_DB: dip
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dip']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://dip:dip@postgres:5432/dip
      # Dev-only default (see ADR-0005 / apps/api/.env.example) — override for any non-local environment.
      JWT_ACCESS_SECRET: dev-only-change-me
      JWT_ACCESS_TTL_SECONDS: 900
      # Dev-only default (see ADR-0012 / apps/api/.env.example) — override for any non-local environment.
      INTEGRATION_CREDENTIALS_ENCRYPTION_KEY: dev-only-change-me
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres-data:
